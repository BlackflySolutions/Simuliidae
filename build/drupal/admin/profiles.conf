#:schema https://creativeprojects.github.io/resticprofile/jsonschema/config-1.json
#
# indentation is not needed but it makes it easier to read ;)
#    exclude-file = [ "root-excludes", "excludes" ]
# This is the default collection of profiles for drupal simuliidae images
# A pair of restic*sh scripts is distributed with it.
#
version = "1"

[default]
  repository = "local:/var/backup/restic"
  initialize = true
  [default.backup]
    verbose = true
  [default.retention]
    before-backup = false
    after-backup = true
    keep-within = "30d"
    prune = true

[code]
  inherit = "default"
  lock = "/tmp/resticprofile-code.lock"
  [code.backup]
    exclude-caches = true
    exclude = ['web/sites/default/files/', 'private/']
    source = [ "/var/www/drupal" ]
  [code.restore]
    target = "/"
    include = "/var/www/drupal"

[files]
  inherit = "default"
  lock = "/tmp/resticprofile-files.lock"
  [files.backup]
    exclude-caches = true
    exclude = ['civicrm','js','css','php']
    source = [ "/var/www/drupal/web/sites/default/files" ]
  [files.restore]
    target = "/"
    include = "/var/www/drupal"

[private]
  inherit = "default"
  lock = "/tmp/resticprofile-private.lock"
  [private.backup]
    exclude-caches = true
    source = [ "/var/www/drupal/private" ]
  [private.restore]
    target = "/"
    include = "/var/www/drupal/private"

[civicrm]
  inherit = "default"
  lock = "/tmp/resticprofile-civicrm.lock"
  [civicrm.backup]
    exclude-caches = true
    exclude = ['upload','templates_c']
    source = [ "/var/www/drupal/web/sites/default/files/civicrm" ]
  [civicrm.restore]
    target = "/"
    include = "/var/www/drupal/private"

[drupaldb]
  inherit = "default"
  lock = "/tmp/resticprofile-drupaldb.lock"
  [drupaldb.backup]
    skip-dump-date = true
    stdin-command = ["mariadb-dump --order-by-primary -u root -p{{ .Env.MYSQL_ROOT_PASSWORD }} -h vsql {{ .Env.DRUPAL_DATABASE }}"]
    # Tell restic the name of the file inside the snapshot
    stdin-filename = "{{ .Env.DRUPAL_DATABASE }}.sql"
    tag = ["database", "mariadb", "drupal"]
  [drupaldb.restore]
    target = "/tmp"

[civicrmdb]
  inherit = "default"
  lock = "/tmp/resticprofile-civicrmdb.lock"
  [civicrmdb.backup]
    stdin-command = ["mariadb-dump --order-by-primary -u root -p{{ .Env.MYSQL_ROOT_PASSWORD }} -h vsql {{ .Env.CIVICRM_DATABASE }}"]
    # Tell restic the name of the file inside the snapshot
    stdin-filename = "{{ .Env.CIVICRM_DATABASE }}.sql"
    tag = ["database", "mariadb", "civicrm"]
  [civicrmdb.restore]
    target = "/tmp"

# this is rarely used, only for sites making use of a database other than drupal or civicrm
[mysqldb]
  inherit = "default"
  lock = "/tmp/resticprofile-mysqldb.lock"
  [mysqldb.backup]
    skip-dump-date = true
    stdin-command = ["mariadb-dump --order-by-primary -u root -p{{ .Env.MYSQL_ROOT_PASSWORD }} -h vsql {{ .Env.MYSQL_DATABASE }}"]
    # Tell restic the name of the file inside the snapshot
    stdin-filename = "{{ .Env.MYSQL_DATABASE }}.sql"
    tag = ["database", "mariadb"]
  [mysqldb.restore]
    target = "/tmp"
